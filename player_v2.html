<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scratch 在线演示</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .player-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .player-toolbar button{padding:8px 12px;border:1px solid #d0d7de;background:#fff;border-radius:6px;cursor:pointer}
    .player-toolbar button.primary{background:#0969da;color:#fff;border-color:#0969da}
    .scaffolding-host{width:100%;height:min(72vh,520px);min-height:412px}
    /* 外部播放器容器样式 */
    .external-player-container {
      width: 100%;
      height: min(72vh, 520px);
      border: none;
      border-radius: 8px;
      background: #000;
    }
  </style>
  <script src="https://unpkg.com/@turbowarp/scaffolding@0.3.0/dist/scaffolding-min.js"></script>
  <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
  <script>
    // 扩展映射表，针对常见的第三方扩展（如 Gandi IDE 的扩展）提供支持
    window.EXTENSION_MAP = {
      'image': 'https://extensions.gandi.pro/extensions/image/index.js',
      'canvas': 'https://extensions.gandi.pro/extensions/canvas/index.js',
      'ai': 'https://extensions.gandi.pro/extensions/ai/index.js',
      'widget': 'https://extensions.gandi.pro/extensions/widget/index.js',
      'json': 'https://extensions.gandi.pro/extensions/json/index.js',
      'storage': 'https://extensions.gandi.pro/extensions/storage/index.js',
      'dolly': 'https://extensions.gandi.pro/extensions/dolly/index.js',
      'media': 'https://extensions.gandi.pro/extensions/media/index.js',
      'camera': 'https://extensions.gandi.pro/extensions/camera/index.js',
      'terminal': 'https://extensions.gandi.pro/extensions/terminal/index.js',
      'fermi': 'https://extensions.gandi.pro/extensions/fermi/index.js',
      'sugar': 'https://extensions.gandi.pro/extensions/sugar/index.js',
      'puremath': 'https://extensions.gandi.pro/extensions/puremath/index.js',
      'physics': 'https://extensions.gandi.pro/extensions/physics/index.js'
    };
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title" id="project-title">Scratch 在线演示</h1>
      <nav class="actions">
        <a href="./index.html">返回列表</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="player-toolbar">
      <button id="btn-load" class="primary" type="button">加载作品</button>
      <button id="btn-flag" type="button" disabled>绿旗</button>
      <button id="btn-stop" type="button" disabled>停止</button>
      <button id="btn-external" type="button" style="background:#4caf50;color:#fff;border-color:#4caf50">使用增强播放器 (支持扩展)</button>
      <span id="status" class="small"></span>
    </div>
    <div id="player" class="player-wrap scaffolding-host"></div>
    <p class="small">提示：如果默认播放器提示“Unknown extension: image”，请点击“使用增强播放器”按钮。</p>
  </main>

  <script>
    console.log('Player version: 2026-04-12-v10-SafeLoad');
    // 拦截脚本和 fetch 逻辑...
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url.includes('extensions.gandi.pro') && !url.includes('/extensions/')) {
        const newUrl = url.replace('extensions.gandi.pro/', 'extensions.gandi.pro/extensions/');
        console.log(`Fetch 拦截重定向: ${url} -> ${newUrl}`);
        return originalFetch(newUrl, options);
      }
      return originalFetch(url, options);
    };

    const originalCreateElement = document.createElement;
    document.createElement = function(tagName) {
      const el = originalCreateElement.apply(this, arguments);
      if (tagName.toLowerCase() === 'script') {
        const originalSetAttribute = el.setAttribute;
        el.setAttribute = function(name, value) {
          if (name === 'src' && typeof value === 'string' && value.includes('extensions.gandi.pro') && !value.includes('/extensions/')) {
            value = value.replace('extensions.gandi.pro/', 'extensions.gandi.pro/extensions/');
            console.log(`Script 拦截重定向: ${value}`);
          }
          return originalSetAttribute.apply(this, arguments);
        };
      }
      return el;
    };
    
    // 强力拦截所有错误，特别是 extensionManager 的报错
    window.addEventListener('error', function(event) {
      if (event.message && event.message.includes('Unknown extension')) {
        console.warn('捕获到 Unknown extension 错误，尝试静默处理');
        event.preventDefault();
      }
    }, true);
    
    window.addEventListener('unhandledrejection', function(event) {
      if (event.reason && event.reason.message && event.reason.message.includes('Unknown extension')) {
        console.warn('捕获到未处理的 extension 拒绝，尝试静默处理');
        event.preventDefault();
      }
    }, true);
    function qs(name) {
      return new URLSearchParams(location.search).get(name) || '';
    }
    const fileUrl = qs('file');
    const title = qs('title') || 'Scratch 在线演示';
    document.getElementById('project-title').textContent = title;

    const container = document.getElementById('player');
    const statusEl = document.getElementById('status');
    const btnLoad = document.getElementById('btn-load');
    const btnFlag = document.getElementById('btn-flag');
    const btnStop = document.getElementById('btn-stop');
    const btnExternal = document.getElementById('btn-external');

    // 错误日志辅助
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('全局错误:', msg, error);
      if (msg.includes('Unknown extension')) {
        setStatus('检测到扩展兼容性问题，建议使用外部 Gandi 播放器');
      }
      return false;
    };

    btnExternal.addEventListener('click', () => {
      if (!fileUrl) return;
      // 使用 TurboWarp 嵌入式播放器作为备选，它对扩展的支持更强
      // 同时通过 extension 参数显式传入 image 扩展的加载地址
      const extensionUrl = 'https://extensions.gandi.pro/extensions/image/index.js';
      const twPlayerUrl = `https://turbowarp.org/embed.html?project_url=${encodeURIComponent(fileUrl)}&extension=${encodeURIComponent(extensionUrl)}`;
      
      container.innerHTML = `<iframe class="external-player-container" src="${twPlayerUrl}" allowtransparency="true" allowfullscreen="true" allow="geolocation; microphone; camera"></iframe>`;
      setStatus('已切换至 TurboWarp 增强播放器 (支持 Gandi 扩展)');
      btnLoad.disabled = true;
      btnFlag.disabled = true;
      btnStop.disabled = true;
    });

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    if (!fileUrl) {
      setStatus('缺少作品文件地址');
      btnLoad.disabled = true;
    } else if (!window.Scaffolding || !window.Scaffolding.Scaffolding) {
      setStatus('播放器加载失败：无法加载运行时脚本（请检查网络是否能访问 unpkg.com）');
      btnLoad.disabled = true;
    } else {
      let scaffolding = null;
      let loaded = false;

      async function loadProject() {
        setStatus('正在下载作品...');
        btnLoad.disabled = true;
        btnFlag.disabled = true;
        btnStop.disabled = true;
        loaded = false;

        if (scaffolding) {
          try { scaffolding.dispose(); } catch (_) {}
          scaffolding = null;
          container.innerHTML = '';
        }

        scaffolding = new window.Scaffolding.Scaffolding();
        scaffolding.width = 480;
        scaffolding.height = 360;
        scaffolding.resizeMode = 'preserve-ratio';
        scaffolding.setup();
        scaffolding.appendTo(container);

        const extensionManager = scaffolding.vm.extensionManager;
        
        // 核心修复：手动将 image 映射到 Gandi URL
        if (scaffolding.addExtension) {
          scaffolding.addExtension('https://extensions.gandi.pro/extensions/image/index.js');
        }

        // 强力拦截所有 loadExtensionURL 调用
        const originalLoad = extensionManager.loadExtensionURL;
        extensionManager.loadExtensionURL = function(id, ...args) {
          let url = window.EXTENSION_MAP[id] || id;
          if (id === 'image' && !url.startsWith('http')) {
            url = 'https://extensions.gandi.pro/extensions/image/index.js';
          }
          console.log(`[ExtensionManager] 正在加载: ${id} -> ${url}`);
          
          // 在内部也尝试捕获
          try {
            const result = originalLoad.call(this, url, ...args);
            if (result && result.catch) {
              return result.catch(err => {
                console.warn(`[ExtensionManager] 内部捕获加载失败 ${id}:`, err);
                return Promise.resolve({
                  getInfo: () => ({ id, blocks: [] })
                });
              });
            }
            return result;
          } catch (e) {
            console.warn(`[ExtensionManager] 同步捕获加载失败 ${id}:`, e);
            return Promise.resolve({
              getInfo: () => ({ id, blocks: [] })
            });
          }
        };

        const res = await fetch(fileUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('作品文件下载失败：' + res.status);
        let buf = await res.arrayBuffer();
        setStatus('正在加载作品...');

        // 核心修复逻辑：通过暴力字符串替换 project.json 中的 ID
        try {
          if (window.JSZip) {
            const zip = await JSZip.loadAsync(buf);
            let jsonStr = await zip.file('project.json').async('string');
            
            // 暴力替换："image" -> 完整 URL，这样无论它在 extensions 数组还是 extensionURLs 映射中都会被修正
            const targetUrl = 'https://extensions.gandi.pro/extensions/image/index.js';
            if (jsonStr.includes('"image"')) {
              console.log('检测到 "image" ID，执行暴力替换为 URL');
              // 替换 extensions 数组中的 ID 和可能存在的其他引用
              jsonStr = jsonStr.replace(/"image"/g, `"${targetUrl}"`);
              
              zip.file('project.json', jsonStr);
              buf = await zip.generateAsync({ type: 'arraybuffer' });
              console.log('项目文件 project.json 已完成暴力重定向并重新打包');
            }
          }
        } catch (e) {
          console.warn('解析或修改作品扩展失败，尝试原始加载:', e);
        }

        await scaffolding.loadProject(buf);

        loaded = true;
        btnFlag.disabled = false;
        btnStop.disabled = false;
        btnLoad.disabled = false;
        setStatus('加载完成');
      }

      btnLoad.addEventListener('click', () => {
        loadProject().catch(err => {
          console.error(err);
          setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
          btnLoad.disabled = false;
          loaded = false;
        });
      });

      btnFlag.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.greenFlag();
          setStatus('运行中');
        } catch (err) {
          console.error(err);
          setStatus('运行失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      btnStop.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.stopAll();
          setStatus('已停止');
        } catch (err) {
          console.error(err);
          setStatus('停止失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      setStatus('正在准备加载...');
      loadProject().catch(err => {
        console.error(err);
        setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
        btnLoad.disabled = false;
        loaded = false;
      });
    }
  </script>
</body>
</html>
