<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scratch 在线演示</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .player-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .player-toolbar button{padding:8px 12px;border:1px solid #d0d7de;background:#fff;border-radius:6px;cursor:pointer}
    .player-toolbar button.primary{background:#0969da;color:#fff;border-color:#0969da}
    .scaffolding-host{width:100%;height:min(72vh,520px);min-height:412px}
  </style>
  <script src="https://unpkg.com/@turbowarp/scaffolding@0.3.0/dist/scaffolding-min.js"></script>
  <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
  <script>
    // 扩展映射表，针对常见的第三方扩展（如 Gandi IDE 的扩展）提供支持
    window.EXTENSION_MAP = {
      'image': 'https://extensions.gandi.pro/extensions/image/index.js',
      'canvas': 'https://extensions.gandi.pro/extensions/canvas/index.js',
      'ai': 'https://extensions.gandi.pro/extensions/ai/index.js',
      'widget': 'https://extensions.gandi.pro/extensions/widget/index.js',
      'json': 'https://extensions.gandi.pro/extensions/json/index.js',
      'storage': 'https://extensions.gandi.pro/extensions/storage/index.js',
      'dolly': 'https://extensions.gandi.pro/extensions/dolly/index.js',
      'media': 'https://extensions.gandi.pro/extensions/media/index.js',
      'camera': 'https://extensions.gandi.pro/extensions/camera/index.js',
      'terminal': 'https://extensions.gandi.pro/extensions/terminal/index.js',
      'fermi': 'https://extensions.gandi.pro/extensions/fermi/index.js',
      'sugar': 'https://extensions.gandi.pro/extensions/sugar/index.js',
      'puremath': 'https://extensions.gandi.pro/extensions/puremath/index.js',
      'physics': 'https://extensions.gandi.pro/extensions/physics/index.js'
    };
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title" id="project-title">Scratch 在线演示</h1>
      <nav class="actions">
        <a href="./index.html">返回列表</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="player-toolbar">
      <button id="btn-load" class="primary" type="button">加载作品</button>
      <button id="btn-flag" type="button" disabled>绿旗</button>
      <button id="btn-stop" type="button" disabled>停止</button>
      <span id="status" class="small"></span>
    </div>
    <div id="player" class="player-wrap scaffolding-host"></div>
    <p class="small">提示：首次加载需要下载作品文件和素材，加载完成后点击“绿旗”开始运行。</p>
  </main>

  <script>
    console.log('Player version: 2026-04-12-v5');
    // 强制全局拦截所有 fetch 请求，尝试修复某些动态加载的资源
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url.includes('extensions.gandi.pro') && !url.includes('/extensions/')) {
        const newUrl = url.replace('extensions.gandi.pro/', 'extensions.gandi.pro/extensions/');
        console.log(`Fetch 拦截重定向: ${url} -> ${newUrl}`);
        return originalFetch(newUrl, options);
      }
      return originalFetch(url, options);
    };
    function qs(name) {
      return new URLSearchParams(location.search).get(name) || '';
    }
    const fileUrl = qs('file');
    const title = qs('title') || 'Scratch 在线演示';
    document.getElementById('project-title').textContent = title;

    const container = document.getElementById('player');
    const statusEl = document.getElementById('status');
    const btnLoad = document.getElementById('btn-load');
    const btnFlag = document.getElementById('btn-flag');
    const btnStop = document.getElementById('btn-stop');

    // 错误日志辅助
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('全局错误:', msg, error);
      return false;
    };
    window.onunhandledrejection = function(event) {
      console.error('未处理的 Promise 拒绝:', event.reason);
    };

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    if (!fileUrl) {
      setStatus('缺少作品文件地址');
      btnLoad.disabled = true;
    } else if (!window.Scaffolding || !window.Scaffolding.Scaffolding) {
      setStatus('播放器加载失败：无法加载运行时脚本（请检查网络是否能访问 unpkg.com）');
      btnLoad.disabled = true;
    } else {
      let scaffolding = null;
      let loaded = false;

      async function loadProject() {
        setStatus('正在下载作品...');
        btnLoad.disabled = true;
        btnFlag.disabled = true;
        btnStop.disabled = true;
        loaded = false;

        if (scaffolding) {
          try { scaffolding.dispose(); } catch (_) {}
          scaffolding = null;
          container.innerHTML = '';
        }

        scaffolding = new window.Scaffolding.Scaffolding();
        scaffolding.width = 480;
        scaffolding.height = 360;
        scaffolding.resizeMode = 'preserve-ratio';
        scaffolding.setup();
        scaffolding.appendTo(container);

        // 监听 VM 扩展请求，自动从映射表加载第三方扩展
        if (scaffolding.vm && scaffolding.vm.extensionManager) {
          // 尝试开启加速模式 (如果支持)
          if (typeof scaffolding.vm.setTurboMode === 'function') {
            scaffolding.vm.setTurboMode(true);
          }
          
          const extensionManager = scaffolding.vm.extensionManager;
          const originalLoad = extensionManager.loadExtensionURL;
          
          extensionManager.loadExtensionURL = function(id, ...args) {
            // 如果 ID 在映射表中，或者 ID 看起来像一个缩写 ID，尝试映射到完整 URL
            let url = window.EXTENSION_MAP[id] || id;
            
            // 兜底策略：如果 id 是常见的 Gandi 扩展名且 url 不是完整的 http 链接
            const gandiExtensions = ['image', 'canvas', 'ai', 'widget', 'json', 'storage', 'dolly', 'media', 'camera', 'terminal', 'fermi', 'sugar', 'puremath', 'physics'];
            if (gandiExtensions.includes(id) && !url.startsWith('http')) {
              url = `https://extensions.gandi.pro/extensions/${id}/index.js`;
            }
            
            console.log(`VM 请求加载扩展: ${id} -> ${url}`);
            
            // 强制忽略 Unknown extension 报错并尝试加载
            try {
              return originalLoad.call(this, url, ...args).catch(err => {
                console.warn(`扩展 ${id} 加载失败，但我们将尝试让 VM 继续运行:`, err);
                // 解决 "Unknown extension" 的关键：如果失败，返回一个空的对象而不是拒绝
                // 这能骗过 VM 的 extensionManager，让它认为扩展已经加载（虽然功能为空）
                return Promise.resolve({
                  getInfo: () => ({ id, blocks: [] })
                });
              });
            } catch (e) {
              console.error(`扩展加载运行时错误 (${id}):`, e);
              return Promise.resolve();
            }
          };
        }

        const res = await fetch(fileUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('作品文件下载失败：' + res.status);
        let buf = await res.arrayBuffer();
        setStatus('正在加载作品...');

        // 核心修复逻辑：通过修改 project.json 将短 ID 扩展替换为完整 URL
        try {
          if (window.JSZip) {
            const zip = await JSZip.loadAsync(buf);
            const projectJson = JSON.parse(await zip.file('project.json').async('string'));
            console.log('原始项目扩展列表:', projectJson.extensions);
            
            let modified = false;
            if (projectJson.extensions && Array.isArray(projectJson.extensions)) {
              projectJson.extensions = projectJson.extensions.map(extId => {
                // 如果是已知映射的扩展，直接替换为 URL
                if (window.EXTENSION_MAP[extId]) {
                  console.log(`转换已知扩展 ID: ${extId} -> ${window.EXTENSION_MAP[extId]}`);
                  modified = true;
                  return window.EXTENSION_MAP[extId];
                }
                // 如果是未知的短 ID 且不是官方扩展，尝试自动映射到 Gandi 源
                if (!extId.includes('/') && !['pen', 'music', 'videoSensing', 'text2speech', 'translate', 'makeymakey', 'microbit', 'ev3', 'boost', 'wedo2', 'gdxfor'].includes(extId)) {
                  // 尝试 Gandi 路径
                  const autoUrl = `https://extensions.gandi.pro/extensions/${extId}/index.js`;
                  console.log(`自动映射未知扩展: ${extId} -> ${autoUrl}`);
                  modified = true;
                  return autoUrl;
                }
                return extId;
              });
            }

            if (modified) {
              console.log('修改后的项目扩展列表:', projectJson.extensions);
              zip.file('project.json', JSON.stringify(projectJson));
              buf = await zip.generateAsync({ type: 'arraybuffer' });
              console.log('项目文件扩展已重定向并重新打包');
              
              // 在正式 loadProject 之前，手动预加载一遍所有扩展 URL
              for (const url of projectJson.extensions) {
                if (url.startsWith('http')) {
                  console.log(`预加载扩展 URL: ${url}`);
                  try {
                    await extensionManager.loadExtensionURL(url);
                  } catch (e) {
                    console.warn(`预加载扩展失败: ${url}`, e);
                  }
                }
              }
            }
          }
        } catch (e) {
          console.warn('解析或修改作品扩展失败，尝试原始加载:', e);
        }

        await scaffolding.loadProject(buf);

        loaded = true;
        btnFlag.disabled = false;
        btnStop.disabled = false;
        btnLoad.disabled = false;
        setStatus('加载完成');
      }

      btnLoad.addEventListener('click', () => {
        loadProject().catch(err => {
          console.error(err);
          setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
          btnLoad.disabled = false;
          loaded = false;
        });
      });

      btnFlag.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.greenFlag();
          setStatus('运行中');
        } catch (err) {
          console.error(err);
          setStatus('运行失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      btnStop.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.stopAll();
          setStatus('已停止');
        } catch (err) {
          console.error(err);
          setStatus('停止失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      setStatus('正在准备加载...');
      loadProject().catch(err => {
        console.error(err);
        setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
        btnLoad.disabled = false;
        loaded = false;
      });
    }
  </script>
</body>
</html>
