<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的 Scratch 作品库</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <script>window.__BUILD__ = '2026-04-10-1';</script>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">我的 Scratch 作品库</h1>
      <nav class="actions">
        <button id="btn-refresh">刷新列表</button>
        <a class="primary" id="link-upload" href="./upload.html">上传作品</a>
        <button id="btn-settings" title="站点设置">设置</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="empty-hint" class="hint" hidden>未找到任何 .sb3 文件。点击右上角“上传作品”添加你的第一个作品。</section>
    <section id="cards" class="grid"></section>
  </main>

  <dialog id="settings-dialog">
    <form method="dialog" class="dialog-form">
      <h3>站点设置</h3>
      <label>GitHub 用户/组织
        <input id="cfg-owner" placeholder="owner，例如: yourname" required />
      </label>
      <label>仓库名
        <input id="cfg-repo" placeholder="repo，例如: scratch-site" required />
      </label>
      <label>分支
        <input id="cfg-branch" placeholder="main 或 gh-pages" value="main" required />
      </label>
      <p class="small">提示：程序会从该仓库的 /projects 目录实时读取 .sb3 文件并展示。</p>
      <menu>
        <button value="cancel">取消</button>
        <button id="go-upload" type="button">去上传</button>
        <button id="save-settings" value="default" class="primary">保存</button>
      </menu>
    </form>
  </dialog>

  <template id="card-tpl">
    <article class="card">
      <div class="thumb">SB3</div>
      <div class="meta">
        <h4 class="title"></h4>
        <p class="sub"></p>
      </div>
      <div class="card-actions">
        <a class="play" target="_self">在线演示</a>
        <a class="download" target="_blank">下载</a>
      </div>
    </article>
  </template>

  <script>
    const CONFIG_KEY = 'scratch_site_config';
    const TOKEN_KEY = 'scratch_site_token';
    function getConfig() {
      const raw = localStorage.getItem(CONFIG_KEY);
      if (raw) {
        try { return JSON.parse(raw); } catch (_) {}
      }
      return { owner: '', repo: '', branch: 'main' };
    }
    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }
    function saveConfig(cfg) {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
    }
    function ensureConfig() {
      const cfg = getConfig();
      if (!cfg.owner || !cfg.repo) {
        document.getElementById('settings-dialog').showModal();
      }
      return cfg;
    }
    function bindSettingsDialog() {
      const dlg = document.getElementById('settings-dialog');
      const btn = document.getElementById('btn-settings');
      const save = document.getElementById('save-settings');
      const goUpload = document.getElementById('go-upload');
      btn.addEventListener('click', () => {
        const cfg = getConfig();
        document.getElementById('cfg-owner').value = cfg.owner || '';
        document.getElementById('cfg-repo').value = cfg.repo || '';
        document.getElementById('cfg-branch').value = cfg.branch || 'main';
        dlg.showModal();
      });
      goUpload.addEventListener('click', () => {
        dlg.close();
        location.href = `./upload.html?v=${encodeURIComponent(window.__BUILD__ || '')}`;
      });
      save.addEventListener('click', (e) => {
        const owner = document.getElementById('cfg-owner').value.trim();
        const repo = document.getElementById('cfg-repo').value.trim();
        const branch = document.getElementById('cfg-branch').value.trim() || 'main';
        if (!owner || !repo) {
          e.preventDefault();
          return;
        }
        saveConfig({ owner, repo, branch });
      });
    }
    (function bindCacheBustLinks() {
      const v = window.__BUILD__ || '';
      if (!v) return;
      const linkUpload = document.getElementById('link-upload');
      if (linkUpload) linkUpload.href = `./upload.html?v=${encodeURIComponent(v)}`;
    })();
    function toRawUrl({ owner, repo, branch, path }) {
      return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
    }
    async function fetchContents(cfg, dirPath) {
      const suffix = dirPath ? `/contents/${encodeURIComponent(dirPath)}` : '/contents';
      const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}${suffix}?ref=${encodeURIComponent(cfg.branch)}`;
      const token = getToken();
      const headers = { 'Accept': 'application/vnd.github+json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(api, { headers });
      if (res.status === 404) return [];
      if (!res.ok) {
        const remaining = res.headers.get('x-ratelimit-remaining');
        const reset = res.headers.get('x-ratelimit-reset');
        let detail = '';
        try {
          const data = await res.json();
          if (data && typeof data.message === 'string') detail = data.message;
        } catch (_) {
          try { detail = await res.text(); } catch (_) {}
        }
        let extra = '';
        if (res.status === 403 && remaining === '0' && reset) {
          const t = new Date(Number(reset) * 1000);
          extra = `（API 限流，将在 ${t.toLocaleString()} 后恢复；可在上传页保存 PAT 以提高额度）`;
        } else if (res.status === 403) {
          extra = '（可能是 API 限流/访问受限；可在上传页保存 PAT 以提高额度）';
        }
        throw new Error(`GitHub API 返回异常: ${res.status}${detail ? ' - ' + detail : ''}${extra}`);
      }
      return await res.json();
    }
    async function fetchProjects(cfg) {
      const [projectsDir, rootDir] = await Promise.all([
        fetchContents(cfg, 'projects'),
        fetchContents(cfg, '')
      ]);
      const all = []
        .concat(Array.isArray(projectsDir) ? projectsDir : [])
        .concat(Array.isArray(rootDir) ? rootDir : []);
      const byPath = new Map();
      for (const it of all) {
        if (!it || typeof it.name !== 'string') continue;
        if (!/\.sb3$/i.test(it.name)) continue;
        if (it.type && it.type !== 'file') continue;
        const key = it.path || it.name;
        if (!byPath.has(key)) byPath.set(key, it);
      }
      return Array.from(byPath.values());
    }
    function renderList(items, cfg) {
      const container = document.getElementById('cards');
      container.innerHTML = '';
      if (!items.length) {
        document.getElementById('empty-hint').hidden = false;
        return;
      }
      document.getElementById('empty-hint').hidden = true;
      const tpl = document.getElementById('card-tpl');
      items.forEach(it => {
        const node = tpl.content.cloneNode(true);
        node.querySelector('.title').textContent = it.name.replace(/\.sb3$/i, '');
        const sizeMB = (it.size / (1024 * 1024)).toFixed(2);
        node.querySelector('.sub').textContent = `大小 ${sizeMB} MB`;
        const relativePath = it.path || it.name;
        const fileUrl = new URL(relativePath, location.href).href;
        node.querySelector('.play').href = `./player.html?file=${encodeURIComponent(fileUrl)}&title=${encodeURIComponent(it.name.replace(/\\.sb3$/i,''))}`;
        node.querySelector('.download').href = fileUrl;
        container.appendChild(node);
      });
    }
    async function load() {
      const cfg = ensureConfig();
      try {
        const items = await fetchProjects(cfg);
        renderList(items, cfg);
      } catch (err) {
        console.error(err);
        alert('加载列表失败：' + err.message);
      }
    }
    document.getElementById('btn-refresh').addEventListener('click', load);
    bindSettingsDialog();
    load();
  </script>
</body>
</html>
