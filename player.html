<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scratch 在线演示</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .player-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .player-toolbar button{padding:8px 12px;border:1px solid #d0d7de;background:#fff;border-radius:6px;cursor:pointer}
    .player-toolbar button.primary{background:#0969da;color:#fff;border-color:#0969da}
    .scaffolding-host{width:100%;height:min(72vh,520px);min-height:412px}
  </style>
  <script src="https://unpkg.com/@turbowarp/scaffolding@0.3.0/dist/scaffolding-min.js"></script>
  <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
  <script>
    // 扩展映射表，针对常见的第三方扩展（如 Gandi IDE 的扩展）提供支持
    window.EXTENSION_MAP = {
      'image': 'https://extensions.gandi.pro/image/index.js',
      'canvas': 'https://extensions.gandi.pro/canvas/index.js',
      'ai': 'https://extensions.gandi.pro/ai/index.js',
      'widget': 'https://extensions.gandi.pro/widget/index.js',
      'json': 'https://extensions.gandi.pro/json/index.js',
      'storage': 'https://extensions.gandi.pro/storage/index.js',
      'dolly': 'https://extensions.gandi.pro/dolly/index.js',
      'media': 'https://extensions.gandi.pro/media/index.js',
      'camera': 'https://extensions.gandi.pro/camera/index.js'
    };
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title" id="project-title">Scratch 在线演示</h1>
      <nav class="actions">
        <a href="./index.html">返回列表</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="player-toolbar">
      <button id="btn-load" class="primary" type="button">加载作品</button>
      <button id="btn-flag" type="button" disabled>绿旗</button>
      <button id="btn-stop" type="button" disabled>停止</button>
      <span id="status" class="small"></span>
    </div>
    <div id="player" class="player-wrap scaffolding-host"></div>
    <p class="small">提示：首次加载需要下载作品文件和素材，加载完成后点击“绿旗”开始运行。</p>
  </main>

  <script>
    function qs(name) {
      return new URLSearchParams(location.search).get(name) || '';
    }
    const fileUrl = qs('file');
    const title = qs('title') || 'Scratch 在线演示';
    document.getElementById('project-title').textContent = title;

    const container = document.getElementById('player');
    const statusEl = document.getElementById('status');
    const btnLoad = document.getElementById('btn-load');
    const btnFlag = document.getElementById('btn-flag');
    const btnStop = document.getElementById('btn-stop');

    // 错误日志辅助
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('全局错误:', msg, error);
      return false;
    };
    window.onunhandledrejection = function(event) {
      console.error('未处理的 Promise 拒绝:', event.reason);
    };

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    if (!fileUrl) {
      setStatus('缺少作品文件地址');
      btnLoad.disabled = true;
    } else if (!window.Scaffolding || !window.Scaffolding.Scaffolding) {
      setStatus('播放器加载失败：无法加载运行时脚本（请检查网络是否能访问 unpkg.com）');
      btnLoad.disabled = true;
    } else {
      let scaffolding = null;
      let loaded = false;

      async function loadProject() {
        setStatus('正在下载作品...');
        btnLoad.disabled = true;
        btnFlag.disabled = true;
        btnStop.disabled = true;
        loaded = false;

        if (scaffolding) {
          try { scaffolding.dispose(); } catch (_) {}
          scaffolding = null;
          container.innerHTML = '';
        }

        scaffolding = new window.Scaffolding.Scaffolding();
        scaffolding.width = 480;
        scaffolding.height = 360;
        scaffolding.resizeMode = 'preserve-ratio';
        scaffolding.setup();
        scaffolding.appendTo(container);

        // 监听 VM 扩展请求，自动从映射表加载第三方扩展
        if (scaffolding.vm && scaffolding.vm.extensionManager) {
          // 允许非沙盒扩展
          scaffolding.vm.setTurbo(true);
          
          const originalLoad = scaffolding.vm.extensionManager.loadExtensionURL;
          scaffolding.vm.extensionManager.loadExtensionURL = function(id, ...args) {
            // 如果 ID 在映射表中，或者 ID 看起来像一个缩写 ID，尝试映射到完整 URL
            const url = window.EXTENSION_MAP[id] || id;
            console.log(`正在请求扩展: ${id} -> ${url}`);
            
            // 如果 url 仍然不是完整链接且不在官方库中，可能会导致 Unknown extension 错误
            // 这里我们强制返回一个 Promise 以防止崩溃
            try {
              return originalLoad.call(this, url, ...args).catch(err => {
                console.warn(`扩展加载失败 (${id}):`, err);
                // 返回一个虚拟扩展以防止 UI 崩溃
                return Promise.resolve();
              });
            } catch (e) {
              console.error(`扩展加载异常 (${id}):`, e);
              return Promise.resolve();
            }
          };
        }

        const res = await fetch(fileUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('作品文件下载失败：' + res.status);
        const buf = await res.arrayBuffer();
        setStatus('正在加载作品...');

        // 尝试从作品文件中解析出扩展列表并预加载
        try {
          if (window.JSZip) {
            const zip = await JSZip.loadAsync(buf);
            const projectJson = JSON.parse(await zip.file('project.json').async('string'));
            if (projectJson.extensions && Array.isArray(projectJson.extensions)) {
              for (const extId of projectJson.extensions) {
                const url = window.EXTENSION_MAP[extId];
                if (url) {
                  console.log(`正在预加载扩展: ${extId} -> ${url}`);
                  try {
                    await scaffolding.vm.extensionManager.loadExtensionURL(url);
                  } catch (e) {
                    console.warn(`预加载扩展 ${extId} 失败:`, e);
                  }
                } else if (!extId.includes('/') && !['pen', 'music', 'videoSensing', 'text2speech', 'translate', 'makeymakey', 'microbit', 'ev3', 'boost', 'wedo2', 'gdxfor'].includes(extId)) {
                  // 如果是一个未知的短 ID（且不是 Scratch 官方扩展），尝试从默认源加载
                  console.log(`尝试为未知扩展加载默认路径: ${extId}`);
                  try {
                    await scaffolding.vm.extensionManager.loadExtensionURL(`https://extensions.gandi.pro/${extId}/index.js`);
                  } catch (e) {
                    console.warn(`自动尝试加载扩展 ${extId} 失败:`, e);
                  }
                }
              }
            }
          }
        } catch (e) {
          console.warn('解析扩展列表失败:', e);
        }

        await scaffolding.loadProject(buf);

        loaded = true;
        btnFlag.disabled = false;
        btnStop.disabled = false;
        btnLoad.disabled = false;
        setStatus('加载完成');
      }

      btnLoad.addEventListener('click', () => {
        loadProject().catch(err => {
          console.error(err);
          setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
          btnLoad.disabled = false;
          loaded = false;
        });
      });

      btnFlag.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.greenFlag();
          setStatus('运行中');
        } catch (err) {
          console.error(err);
          setStatus('运行失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      btnStop.addEventListener('click', () => {
        if (!loaded || !scaffolding) return;
        try {
          scaffolding.stopAll();
          setStatus('已停止');
        } catch (err) {
          console.error(err);
          setStatus('停止失败：' + (err && err.message ? err.message : String(err)));
        }
      });

      setStatus('正在准备加载...');
      loadProject().catch(err => {
        console.error(err);
        setStatus('加载失败：' + (err && err.message ? err.message : String(err)));
        btnLoad.disabled = false;
        loaded = false;
      });
    }
  </script>
</body>
</html>
