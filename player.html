<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scratch 在线演示</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title" id="project-title">Scratch 在线演示</h1>
      <nav class="actions">
        <a href="./index.html">返回列表</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="player" class="player-wrap"></div>
    <p class="small">提示：如无法加载，点击“在 TurboWarp 打开”尝试。</p>
  </main>

  <script>
    function qs(name) {
      return new URLSearchParams(location.search).get(name) || '';
    }
    const fileUrl = qs('file');
    const title = qs('title') || 'Scratch 在线演示';
    document.getElementById('project-title').textContent = title;
    if (!fileUrl) {
      alert('缺少作品文件地址');
    } else {
      const container = document.getElementById('player');
      const iframe = document.createElement('iframe');
      const src = `https://turbowarp.org/embed?project_url=${encodeURIComponent(fileUrl)}&autoplay&settings-button`;
      iframe.src = src;
      iframe.width = '482';
      iframe.height = '412';
      iframe.setAttribute('allowtransparency', 'true');
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('scrolling', 'no');
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.colorScheme = 'auto';
      iframe.style.maxWidth = '100%';
      iframe.style.borderRadius = '6px';
      container.appendChild(iframe);

      const open = document.createElement('a');
      open.href = `https://turbowarp.org/?project_url=${encodeURIComponent(fileUrl)}&autoplay`;
      open.target = '_blank';
      open.rel = 'noreferrer';
      open.textContent = '在 TurboWarp 打开';
      open.className = 'tw-open';
      container.insertAdjacentElement('afterend', open);
    }
  </script>
</body>
</html>
